<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PCF Calculator — Vantage Specialty Ingredients</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g0:#0f3d28;--g1:#1e6b4a;--g2:#2a8a60;--g3:#3daa7a;
  --mint:#b8eed6;--sky:#eaf7f1;
  --ink:#1a1a1a;--body:#3a3a3a;--muted:#6b7280;
  --border:#dde3db;--bg:#f3f5f2;--white:#fff;
  --amber:#d97706;--amberBg:#fffbeb;--amberBorder:#fcd34d;
  --blue:#2563eb;--blueBg:#eff6ff;--blueBorder:#bfdbfe;
  --red:#dc2626;--redBg:#fef2f2;
  --opt:#7c3aed;--optBg:#f5f3ff;--optBorder:#ddd6fe;
  --badge:#e0f2fe;--badgeText:#0369a1;
  --qty-bg:#f0faf6;--qty-border:#86efac;
}
body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);font-size:14px}
.topbar{background:var(--g0);height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;box-shadow:0 1px 14px rgba(0,0,0,.22)}
.tbl{display:flex;align-items:center;gap:11px}
.tbi{font-size:22px}
.tbname{font-size:16px;font-weight:800;color:#fff;line-height:1.1}
.tbsub{font-size:11px;color:#7dd3b0;font-weight:500}
.tbpcf{font-size:11px;color:#7dd3b0;font-weight:600;text-align:right}
.tbpcf span{display:block;font-size:21px;color:#fff;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.main{max-width:920px;margin:0 auto;padding:32px 18px 80px}
.prog{display:flex;align-items:flex-start;margin-bottom:28px;overflow-x:auto;padding-bottom:4px}
.pstep{display:flex;align-items:flex-start;flex-shrink:0}
.pdotcol{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.pdot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .2s;user-select:none}
.pdot.done{background:var(--g1);color:#fff}
.pdot.active{background:var(--g3);color:#fff;box-shadow:0 0 0 5px rgba(61,170,122,.18)}
.pdot.todo{background:#e0e0e0;color:#999}
.pdot.opt-done{background:var(--opt);color:#fff}
.pdot.opt-active{background:var(--opt);color:#fff;box-shadow:0 0 0 5px rgba(124,58,237,.18)}
.pdot.opt-todo{background:#ede9fe;color:var(--opt)}
.plabel{font-size:10px;font-weight:600;color:var(--muted);text-align:center;max-width:64px;line-height:1.3}
.plabel.active{color:var(--g2)}
.plabel.opt-active{color:var(--opt)}
.opt-tag{font-size:8px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--opt);line-height:1}
.pline{width:32px;height:2px;background:#e0e0e0;margin-top:16px;flex-shrink:0;transition:background .2s}
.pline.done{background:var(--g1)}
.pline.opt-done{background:var(--opt)}
.card{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.ch{padding:22px 28px 20px;color:#fff}
.ch.main-step{background:linear-gradient(120deg,var(--g0) 0%,var(--g2) 100%)}
.ch.opt-step{background:linear-gradient(120deg,#4c1d95 0%,#7c3aed 100%)}
.ch h2{font-size:21px;font-weight:800;letter-spacing:-.3px;margin-bottom:3px}
.ch p{font-size:13px;color:rgba(255,255,255,.7);font-weight:400;line-height:1.5}
.opt-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.9);margin-bottom:10px}
.cb{padding:26px 28px}
.help{background:var(--blueBg);border:1px solid var(--blueBorder);border-radius:10px;padding:13px 16px;margin-bottom:22px;display:flex;gap:11px}
.hico{font-size:19px;flex-shrink:0;line-height:1.4}
.htxt{font-size:13px;color:#1e3a8a;line-height:1.65}
.htxt strong{font-weight:700}
.htxt ul{padding-left:16px;margin-top:5px}
.htxt li{margin-bottom:3px}
.opt-banner{background:var(--optBg);border:1px solid var(--optBorder);border-radius:10px;padding:13px 16px;margin-bottom:22px;display:flex;gap:11px;align-items:flex-start}
.otxt{font-size:13px;color:#4c1d95;line-height:1.6}
.otxt strong{font-weight:700}
.sh{font-size:11px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;color:var(--g1);padding-bottom:7px;border-bottom:2px solid var(--mint);margin:22px 0 15px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px}
.ff{grid-column:1/-1}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:12px;font-weight:700;color:var(--body)}
.fld input,.fld select,.fld textarea{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:var(--white);outline:none;transition:border-color .15s,box-shadow .15s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--g3);box-shadow:0 0 0 3px rgba(61,170,122,.12)}
.fld textarea{resize:vertical;min-height:70px}
.tip{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:2px}
/* method toggle */
.method-toggle{display:flex;gap:0;margin-bottom:20px;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;width:fit-content}
.method-btn{padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:var(--white);color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.method-btn.active{background:var(--g1);color:#fff}
.method-btn:not(.active):hover{background:var(--sky);color:var(--g1)}
.alloc-box{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:12px;padding:18px 20px;margin-bottom:20px}
.alloc-box .alloc-title{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--g1);margin-bottom:12px}
.alloc-result{background:var(--g0);color:#fff;border-radius:9px;padding:14px 18px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.alloc-result .ar-label{font-size:11px;color:var(--mint);font-weight:600}
.alloc-result .ar-val{font-size:22px;font-weight:800;letter-spacing:-.5px}
.alloc-result .ar-unit{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.alloc-breakdown{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap}
.alloc-sc{background:rgba(255,255,255,.1);border-radius:7px;padding:8px 14px;text-align:center}
.alloc-sc .asc-label{font-size:10px;font-weight:700;color:var(--mint);letter-spacing:.5px}
.alloc-sc .asc-val{font-size:16px;font-weight:800;color:#fff}
.alloc-sc .asc-unit{font-size:10px;color:rgba(255,255,255,.5)}
/* ── Material Picker ── */
.picker-wrap{border:1px solid #c0e8d4;border-radius:12px;overflow:hidden;margin-bottom:16px}
.picker-search-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--sky);border-bottom:1px solid #c0e8d4;flex-wrap:wrap}
.picker-search-input{flex:1;min-width:180px;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .15s}
.picker-search-input:focus{border-color:var(--g3);box-shadow:0 0 0 3px rgba(61,170,122,.1)}
.picker-cat-filters{display:flex;gap:6px;flex-wrap:wrap}
.cat-pill{padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .13s;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap}
.cat-pill.active{background:var(--g1);color:#fff;border-color:var(--g1)}
.cat-pill:not(.active):hover{background:var(--sky);border-color:var(--g3);color:var(--g1)}
.picker-results{max-height:220px;overflow-y:auto;background:var(--white)}
.picker-results-inner{padding:8px}
.picker-group-label{font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);padding:6px 6px 4px;margin-top:4px}
.picker-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;cursor:pointer;transition:background .12s;gap:8px}
.picker-row:hover{background:var(--sky)}
.picker-row-left{display:flex;align-items:center;gap:8px;min-width:0}
.picker-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px}
.picker-cat-tag{font-size:10px;color:var(--muted);white-space:nowrap}
.picker-ef{font-size:12px;font-weight:800;color:var(--g1);white-space:nowrap;flex-shrink:0}
.picker-ef-unit{font-size:10px;color:var(--muted);font-weight:400}
.picker-add-btn{background:var(--g1);color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:'Plus Jakarta Sans',sans-serif;transition:background .13s}
.picker-add-btn:hover{background:var(--g2)}
.picker-empty{padding:18px;text-align:center;font-size:13px;color:var(--muted)}
.picker-footer{padding:10px 14px;background:#fafaf9;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}
.ef-badge{font-size:9.5px;font-weight:700;background:var(--badge);color:var(--badgeText);border-radius:4px;padding:1px 5px;white-space:nowrap}
/* table */
.tw{overflow-x:auto;margin-bottom:10px}
table.dt{width:100%;border-collapse:collapse}
table.dt thead th{background:var(--g0);color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:9px;text-align:left;white-space:nowrap}
table.dt thead th:first-child{border-radius:8px 0 0 0}
table.dt thead th:last-child{border-radius:0 8px 0 0}
table.dt tbody tr:hover{background:#f0faf5}
table.dt tbody td{padding:5px 6px;border-bottom:1px solid #eee;vertical-align:middle}
table.dt td input,table.dt td select{padding:7px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;background:var(--white);outline:none;transition:border-color .15s}
table.dt td input:focus,table.dt td select:focus{border-color:var(--g3)}
table.dt tfoot td{background:var(--g0);color:#fff;font-weight:700;font-size:12px;padding:8px 9px}
table.dt tfoot td:first-child{border-radius:0 0 0 8px}
table.dt tfoot td:last-child{border-radius:0 0 8px 0}
.nc{text-align:right;font-weight:700;color:var(--g1);font-size:13px;padding-right:5px}
.dc{font-size:11.5px;color:var(--muted);text-align:center}
.pre-badge{font-size:9.5px;font-weight:700;background:var(--badge);color:var(--badgeText);border-radius:4px;padding:1px 5px;white-space:nowrap}
.qty-prefilled{background:var(--qty-bg)!important;border-color:var(--qty-border)!important}
.btn-add{padding:8px 14px;border:1.5px dashed var(--g3);background:none;color:var(--g1);font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.btn-add:hover{background:var(--sky)}
.btn-rm{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:2px 5px;border-radius:4px;transition:color .15s;line-height:1}
.btn-rm:hover{color:var(--red)}
.legend-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-swatch{width:12px;height:12px;border-radius:3px;border:1.5px solid}
/* results */
.hero{border-radius:14px;padding:26px 30px;color:#fff;text-align:center;margin-bottom:22px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--g0) 0%,var(--g3) 100%)}
.hero-lbl{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mint);margin-bottom:5px}
.hero-num{font-size:50px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.hero-num.xl{font-size:72px;letter-spacing:-3px;margin-bottom:6px}
.hero-unit{font-size:14px;color:var(--mint)}
.hero-meta{margin-top:7px;font-size:12px;color:rgba(255,255,255,.5)}
.hero-sub{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.15);font-size:13px;color:rgba(255,255,255,.7)}
.hero-sub strong{color:#fff}
.prelim-badge{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 11px;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.85)}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:22px}
.sbox{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stag{font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--muted)}
.sdesc{font-size:11px;color:var(--muted);margin:3px 0 9px}
.sval{font-size:24px;font-weight:800;color:var(--g1);letter-spacing:-.8px;line-height:1}
.sunit{font-size:10px;color:var(--muted);margin-top:2px}
.spct{font-size:12px;color:var(--g2);font-weight:700;margin-top:3px}
.br-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.brl{font-size:12px;color:var(--body);width:185px;flex-shrink:0;line-height:1.3}
.brt{flex:1;height:20px;background:#eee;border-radius:4px;overflow:hidden}
.brf{height:100%;background:linear-gradient(90deg,var(--g0),var(--g3));border-radius:4px;transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:7px}
.brf-v{font-size:10px;color:#fff;font-weight:700}
.brn{font-size:12px;font-weight:700;color:var(--g1);width:75px;text-align:right}
.warn{background:var(--amberBg);border:1px solid var(--amberBorder);border-radius:10px;padding:12px 15px;font-size:13px;color:#92400e;line-height:1.6}
.note-block{border-radius:10px;padding:14px 18px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
.note-icon{font-size:20px;flex-shrink:0}
.note-txt{font-size:13px;line-height:1.65}
.note-txt strong{font-weight:700}
/* nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:20px;border-top:1px solid var(--border)}
.btn{padding:11px 22px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn-g{background:var(--g1);color:#fff}
.btn-g:hover{background:var(--g2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(30,107,74,.28)}
.btn-gh{background:#eee;color:var(--muted)}
.btn-gh:hover{background:#e0e0e0}
.btn-t{background:var(--g3);color:#fff}
.btn-t:hover{background:var(--g2)}
.btn-skip{background:var(--optBg);color:var(--opt);border:1.5px solid var(--optBorder)}
.btn-skip:hover{background:#ede9fe}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rec-footer{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;justify-content:space-between;font-size:11px;color:var(--muted)}
/* report preview */
.rpt-preview{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:20px}
.rpt-preview-hdr{padding:9px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#fafaf9}
.rpt-preview-body{padding:28px 32px;font-size:14px;line-height:1.75;color:#1a1a1a;max-height:600px;overflow-y:auto}
.rpt-preview-body h1{font-size:22px;font-weight:800;color:var(--g1);margin-bottom:3px;letter-spacing:-.4px}
.rpt-preview-body .rpt-sub{font-size:12px;color:var(--muted);margin-bottom:22px;padding-bottom:12px;border-bottom:2px solid var(--mint)}
.rpt-preview-body h2{font-size:16px;font-weight:800;color:var(--g1);margin:22px 0 8px;padding-bottom:5px;border-bottom:2px solid var(--mint)}
.rpt-preview-body h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:10px 0 5px}
.rpt-preview-body p{margin-bottom:10px}
.rpt-preview-body table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.rpt-preview-body th{background:var(--g1);color:#fff;padding:7px 10px;text-align:left;font-weight:700}
.rpt-preview-body td{padding:6px 10px;border-bottom:1px solid #eee}
.rpt-preview-body tr:nth-child(even) td{background:#f8f8f8}
.rpt-preview-body ul{padding-left:18px;margin-bottom:10px}
.rpt-preview-body li{margin-bottom:4px}
.rpt-result-box{background:linear-gradient(135deg,var(--g0),var(--g3));color:#fff;border-radius:10px;padding:18px 22px;margin:14px 0;text-align:center}
.rpt-result-box .big{font-size:38px;font-weight:800;letter-spacing:-1px;line-height:1}
.rpt-result-box .unit{font-size:13px;color:var(--mint);margin-top:4px}
.rpt-result-box .sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:6px}
.rpt-signoff{border-top:1px solid #eee;margin-top:18px;padding-top:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;font-size:12px}
.rpt-signoff-field{border-bottom:1px solid #ccc;padding-bottom:4px;margin-bottom:3px;min-height:22px;font-size:12px;color:var(--ink)}
.rpt-signoff-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.disclaimer{font-size:11px;color:var(--muted);font-style:italic;margin-top:16px;padding-top:12px;border-top:1px solid #eee;line-height:1.6}
@media(max-width:640px){
  .fg,.fg3{grid-template-columns:1fr}
  .sg{grid-template-columns:1fr}
  .cb,.ch{padding:18px}
  .topbar{padding:0 14px}
  .main{padding:18px 10px 60px}
  .brl{width:120px;font-size:11px}
  .hero-num.xl{font-size:52px}
  .rpt-signoff{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tbl">
    <span class="tbi">🌿</span>
    <div>
      <div class="tbname">PCF Calculator</div>
      <div class="tbsub">Product Carbon Footprint · ISO 14067</div>

  <div id="topbar-pcf" class="tbpcf" style="display:none">

  <div class="card" id="card">

  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════

const MAT_DB = [

//  PCF CALC
// ══════════════════════════════════════════════════════════════
function calcPCF() {
  const batch = parseFloat(S.pi.batchSize)||1;
  const fu    = parseFloat(S.pi.funcUnit)||1;

  // Raw materials + transport
  const rmTotal = S.mats.reduce((s,m) => {
    const q=+m.qty||0, ef=+m.ef||0;
    const tef = (TRN.find(t=>t.label===m.trn)||{ef:0.0623}).ef;
    return s + (q*ef + q/1000*(+m.dist||0)*tef) / batch * fu;
  }, 0);

  // Energy — Method A (per-batch rows) or Method B (site allocation)
  let enTotal=0, enScope1=0, enScope2=0;
  if (S.energyMethod === "B") {
    const prodKg = S.site.prodUnit === "lb"
      ? (+S.site.prod_lb||1) * 0.453592
      : (+S.site.prod_lb||1);
    const sc1_kg = (+S.site.sc1_mt||0) * 1000;  // MT → kg CO₂e
    const sc2_kg = (+S.site.sc2_mt||0) * 1000;
    const allocFactor = fu / prodKg;             // per functional unit kg
    enScope1 = sc1_kg * allocFactor;
    enScope2 = sc2_kg * allocFactor;
    enTotal  = enScope1 + enScope2;
  } else {
    const enItems = S.ens.map(e => {
      const opt = EN[+e.tidx]||EN[0];
      const ef  = e.cusEf !== "" ? +e.cusEf||0 : opt.ef;
      return {scope: opt.scope, co2e: (+e.qty||0)*ef/batch*fu};
    });
    enTotal  = enItems.reduce((s,e) => s+e.co2e, 0);
    enScope1 = enItems.filter(e=>e.scope===1).reduce((s,e)=>s+e.co2e,0);
    enScope2 = enItems.filter(e=>e.scope===2).reduce((s,e)=>s+e.co2e,0);
  }

  const peTotal = S.proc.reduce((s,p) =>
    s + (+p.qty||0) * (GAS.find(g=>g.label===p.gas)||{gwp:1}).gwp / batch * fu, 0);
  const wwTotal = S.wste.reduce((s,w) =>
    s + (+w.qty||0) * (DISP.find(d=>d.label===w.route)||{ef:0}).ef / batch * fu, 0);
  const total   = rmTotal + enTotal + peTotal + wwTotal;

  return {rmTotal, enTotal, enScope1, enScope2, peTotal, wwTotal, total,
    scope1: enScope1 + peTotal,
    scope2: enScope2,
    scope3: rmTotal + wwTotal};
}

function calcSiteAlloc() {
  const prodKg = S.site.prodUnit === "lb"
    ? (+S.site.prod_lb||1) * 0.453592
    : (+S.site.prod_lb||1);
  const sc1_kgco2e = (+S.site.sc1_mt||0) * 1000;
  const sc2_kgco2e = (+S.site.sc2_mt||0) * 1000;
  const total_kgco2e = sc1_kgco2e + sc2_kgco2e;
  const fu = parseFloat(S.pi.funcUnit)||1;
  const sc1_per_kg = sc1_kgco2e / prodKg * fu;
  const sc2_per_kg = sc2_kgco2e / prodKg * fu;
  return {prodKg, sc1_kgco2e, sc2_kgco2e, total_kgco2e,
          sc1_per_kg, sc2_per_kg, total_per_kg: sc1_per_kg + sc2_per_kg};
}

function buildReport() {
  const pcf   = calcPCF();
  const pi    = S.pi;
  const today = new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  const ver   = "1.0";

  // Hotspot
  const stages = [
    {label:"Raw Materials & Transport", val:pcf.rmTotal, scope:"3"},
    {label:"Energy & Utilities",        val:pcf.enTotal, scope:"1/2"},
    {label:"Direct Process Emissions",  val:pcf.peTotal, scope:"1"},
    {label:"Waste & Water",             val:pcf.wwTotal, scope:"3"},
  ];
  const hot = stages.reduce((a,b)=>a.val>b.val?a:b);

  // Data quality flags
  const defCount = S.mats.filter(m=>m.isDef).length;
  const matCount = S.mats.filter(m=>(+m.qty||0)>0).length;
  const hasDefaults = defCount > 0;
  const energyMethodLabel = S.energyMethod==="B"
    ? `Site GHG inventory allocation (Method B) — Scope 1: ${S.site.sc1_mt.toLocaleString()} MT CO₂e, Scope 2 (market): ${S.site.sc2_mt.toLocaleString()} MT CO₂e, Site production: ${S.site.prodUnit==="lb"?(+S.site.prod_lb/1e6).toFixed(0)+" million lb":(+S.site.prod_lb).toLocaleString()+" kg"}`
    : "Per-batch energy entry (Method A)";

  // Hotspot-specific recommendations (rule-based)
  const recs = [];
  if (hot.label.includes("Raw Material")) {
    recs.push("Request supplier-specific Environmental Product Declarations (EPDs) or primary emission factors from your top 3 raw material suppliers — particularly tallow and coconut oil, which typically carry the highest embodied carbon.");
    recs.push("Evaluate the cut-off/zero-burden methodology for co-product and waste-derived feedstocks (tallow, crude glycerine, grape seeds), which can materially reduce the raw material footprint under ISO 14067.");
    recs.push("Consider substituting higher-EF vegetable oils (coconut, palm) with lower-EF alternatives where technically feasible, or sourcing with certified sustainability schemes (RSPO, etc.).");
  } else if (hot.label.includes("Energy")) {
    recs.push("Validate site energy consumption with actual utility meter data or energy management system records — replacing default literature values with actuals is the fastest accuracy improvement for the energy stage.");
    recs.push("Investigate renewable electricity procurement (RECs/EACs) for the manufacturing site. Market-based Scope 2 factors for certified renewable electricity approach zero, substantially reducing the energy stage contribution.");
    recs.push("Benchmark site energy intensity (kWh/tonne and GJ/tonne) against ICIS oleochemical industry benchmarks (15–40 kWh/tonne electricity; 0.3–1.2 GJ/tonne gas) and identify equipment or process efficiency opportunities.");
  } else {
    recs.push("Obtain primary supplier emission factor data to replace ecoinvent 3.10 industry averages, which carry ±10–30% uncertainty. Prioritize your highest-volume and highest-EF materials first.");
    recs.push("Conduct a formal sensitivity analysis on the top three emission contributors to understand the range of plausible PCF outcomes before external disclosure.");
    recs.push("Engage with key raw material suppliers on their own decarbonization roadmaps and request updated EPD data annually to track PCF improvement over time.");
  }

  // Scope 2 note
  const sc2Note = pcf.scope2 < 0.005 && pcf.enTotal > 0
    ? "<strong>Note on Scope 2:</strong> Market-based Scope 2 emissions are near-zero, indicating significant renewable electricity procurement (RECs/EACs) at the manufacturing site. Location-based Scope 2 should be reported in parallel per GHG Protocol Scope 2 Guidance for full transparency."
    : "";

  const rptHtml = `
<h1>Product Carbon Footprint Declaration</h1>
<div class="rpt-sub">${esc(pi.name||"—")}${pi.code?" · "+esc(pi.code):""} &nbsp;|&nbsp; ${esc(pi.site||"—")} &nbsp;|&nbsp; Version ${ver} &nbsp;|&nbsp; ${esc(pi.year||new Date().getFullYear())}</div>

<h2>Executive Summary</h2>
<p>This document presents a preliminary, cradle-to-gate Product Carbon Footprint (PCF) for <strong>${esc(pi.name||"the product")}</strong>${pi.site?" manufactured at "+esc(pi.site):""}, assessed in accordance with ISO 14067:2018 and the GHG Protocol Product Standard. The total PCF is <strong>${fmt(pcf.total)} kg CO₂e per kg of product</strong>. The primary emission contributor is <strong>${esc(hot.label)}</strong>, accounting for ${pct(hot.val,pcf.total)}% of the total footprint. This assessment should be treated as preliminary and is intended for internal use until independently verified.</p>

<div class="rpt-result-box">
  <div class="big">${fmt(pcf.total)}</div>
  <div class="unit">kg CO₂e per ${pi.funcUnit||1} kg of product (cradle-to-gate)</div>
  <div class="sub">${esc(pi.name||"Product")} · ${esc(pi.site||"—")} · ${pi.year||new Date().getFullYear()}</div>
</div>

<h2>PCF Results by Stage</h2>
<table>
<thead><tr><th>Emission Stage</th><th>GHG Scope</th><th>kg CO₂e / kg product</th><th>% of Total</th></tr></thead>
<tbody>
  <tr><td>Raw Materials &amp; Transport</td><td>Scope 3</td><td>${fmt(pcf.rmTotal)}</td><td>${pct(pcf.rmTotal,pcf.total)}%</td></tr>
  <tr><td>Energy &amp; Utilities${S.energyMethod==="B"?" <em>(site allocation)</em>":""}</td><td>Scope 1 / 2</td><td>${fmt(pcf.enTotal)}</td><td>${pct(pcf.enTotal,pcf.total)}%</td></tr>
  <tr><td>Direct Process Emissions</td><td>Scope 1</td><td>${fmt(pcf.peTotal)}</td><td>${pct(pcf.peTotal,pcf.total)}%</td></tr>
  <tr><td>Waste &amp; Water Treatment</td><td>Scope 3</td><td>${fmt(pcf.wwTotal)}</td><td>${pct(pcf.wwTotal,pcf.total)}%</td></tr>
</tbody>
<tfoot><tr><td><strong>Total</strong></td><td></td><td><strong>${fmt(pcf.total)}</strong></td><td><strong>100%</strong></td></tr></tfoot>
</table>

<h2>Scope Breakdown</h2>
<table>
<thead><tr><th>Scope</th><th>Description</th><th>kg CO₂e / kg product</th><th>% of Total</th></tr></thead>
<tbody>
  <tr><td><strong>Scope 1</strong></td><td>Direct on-site combustion &amp; process emissions</td><td>${fmt(pcf.scope1)}</td><td>${pct(pcf.scope1,pcf.total)}%</td></tr>
  <tr><td><strong>Scope 2</strong></td><td>Purchased electricity &amp; steam (market-based)</td><td>${fmt(pcf.scope2)}</td><td>${pct(pcf.scope2,pcf.total)}%</td></tr>
  <tr><td><strong>Scope 3</strong></td><td>Upstream raw materials, transport &amp; waste</td><td>${fmt(pcf.scope3)}</td><td>${pct(pcf.scope3,pcf.total)}%</td></tr>
</tbody>
<tfoot><tr><td><strong>Total</strong></td><td></td><td><strong>${fmt(pcf.total)}</strong></td><td><strong>100%</strong></td></tr></tfoot>
</table>
${sc2Note?`<p>${sc2Note}</p>`:""}

<h2>Hotspot Analysis &amp; Priority Actions</h2>
<p>The primary emission hotspot is <strong>${esc(hot.label)}</strong> at ${pct(hot.val,pcf.total)}% of the total PCF (${fmt(hot.val)} kg CO₂e/kg). Reducing emissions or improving data quality in this stage will have the greatest impact on both result accuracy and actual emission reduction.</p>
<ul>${recs.map(r=>`<li>${r}</li>`).join("")}</ul>

<h2>Methodology</h2>
<p><strong>System boundary:</strong> Cradle-to-gate (raw material extraction through end of manufacturing; use phase and end-of-life excluded). <strong>Standards:</strong> ISO 14067:2018 (Carbon Footprint of Products) and GHG Protocol Product Standard. <strong>Characterization:</strong> IPCC Sixth Assessment Report (AR6) GWP100 values. <strong>Primary emission factor source:</strong> ecoinvent 3.10. <strong>Transport factors:</strong> GLEC Framework v3.0 and EPA Supply Chain GHG Emission Factors v1.3. <strong>Energy method:</strong> ${energyMethodLabel}. <strong>Allocation:</strong> Mass-based allocation applied at the manufacturing stage where applicable. <strong>Co-product treatment:</strong> Cut-off/zero-burden approach applied to waste-derived and co-product feedstocks (e.g. tallow, crude glycerine) unless otherwise stated.</p>

<h2>Data Quality &amp; Uncertainty</h2>
<p><strong>Emission factors:</strong> All material EFs sourced from ecoinvent 3.10 unless supplier-specific EPD data is available. Industry-average EFs carry approximately ±10–30% uncertainty. ${hasDefaults?`<strong>${defCount} of ${matCount} material${matCount!==1?"s":""}</strong> in this assessment still use literature-based default quantities rather than actual formulation data — replacing these with verified batch weights is the highest-priority accuracy improvement.`:""} <strong>Energy data:</strong> ${S.energyMethod==="B"?"Site-level GHG inventory data used for energy allocation — primary data source, high confidence.":"Energy quantities entered as per-batch estimates; verify against utility meters for higher confidence."} Results should be treated as preliminary until primary data replaces all defaults and an independent review is completed.</p>

<div class="rpt-signoff">
  <div>
    <div class="rpt-signoff-field">${esc(pi.preparedBy||"")}</div>
    <div class="rpt-signoff-lbl">Prepared By</div>
  </div>
  <div>
    <div class="rpt-signoff-field"></div>
    <div class="rpt-signoff-lbl">Reviewed By</div>
  </div>
  <div>
    <div class="rpt-signoff-field">${today} &nbsp;|&nbsp; Version ${ver}</div>
    <div class="rpt-signoff-lbl">Date &amp; Version</div>
  </div>
</div>

<p class="disclaimer">PRELIMINARY — FOR INTERNAL USE ONLY. This Product Carbon Footprint assessment has been prepared using a combination of primary and secondary data and should be treated as a preliminary estimate. It has not been independently verified or certified and does not constitute a formal ISO 14067-verified declaration. This document must not be used for external marketing claims, regulatory submissions, or customer-facing disclosures without prior independent third-party verification. Emission factors sourced from ecoinvent 3.10 are industry averages and carry inherent uncertainty. Results are valid as of the assessment date stated above and should be updated when significant changes occur to formulation, supplier mix, or manufacturing processes. Vantage Specialty Ingredients — Sustainability &amp; Environmental Reporting.</p>`;

  return rptHtml;
}

function render() {
  // Progress
  document.getElementById("prog").innerHTML = STEPS.map((s,i) => {
    const opt = s.opt;
    let cls = "todo";
    if (i < S.step) cls = opt ? "opt-done" : "done";
    else if (i === S.step) cls = opt ? "opt-active" : "active";
    else if (opt) cls = "opt-todo";
    return `<div class="pstep">
  <div class="pdotcol" data-goto="${i}">
    <div class="pdot ${cls}">${i<S.step?"✓":s.emoji}</div>
    <div class="plabel${i===S.step?(opt?" opt-active":" active"):""}">${s.label}</div>
    ${opt?`<div class="opt-tag">Optional</div>`:""}
  </div>
  ${i<STEPS.length-1?`<div class="pline${i<S.step?(s.opt?" opt-done":" done"):""}"></div>`:""}
</div>`;
  }).join("");

  // Card header
  const st = STEPS[S.step];
  document.getElementById("card-header").innerHTML = `
<div class="ch ${st.opt?"opt-step":"main-step"}">
  ${st.opt?`<div class="opt-pill">⚡ Optional Step</div>`:""}
  <h2>${st.emoji} ${st.label}</h2>
  <p>${STEP_DESC[S.step]}</p>
</div>`;

  // Step body
  const bodies = [renderStep1,renderStep2,renderStep3,renderStep4,renderStep5,renderStep6,renderStep7];
  document.getElementById("card-body").innerHTML = bodies[S.step]() + renderNav();

  updateTopbarLive();
}

function renderNav() {
  const st = STEPS[S.step];
  return `<div class="nav">
  <button class="btn btn-gh" data-action="back" ${S.step===0?"disabled":""}>← Back</button>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:12px;color:var(--muted)">Step ${S.step+1} of ${STEPS.length}</span>
    ${st.opt&&S.step<STEPS.length-1?`<button class="btn btn-skip" data-action="skip">Skip →</button>`:""}
    ${S.step<STEPS.length-1?`<button class="btn btn-g" data-action="next">Next →</button>`:""}
  </div>
</div>`;
}

// ══════════════════════════════════════════════════════════════
//  LIVE TOTAL UPDATERS (no full re-render on input)
// ══════════════════════════════════════════════════════════════
function updateTopbarLive() {
  const pcf = calcPCF(), tb = document.getElementById("topbar-pcf");
  if (pcf.total > 0) {
    tb.style.display = "";
    document.getElementById("topbar-val").textContent = `${fmt(pcf.total)} kg CO₂e/kg`;
  } else { tb.style.display = "none"; }
}
function updateMatTotals() {
  let total = 0;
  S.mats.forEach(row => {
    const q=+row.qty||0, ef=+row.ef||0;
    const tef = (TRN.find(t=>t.label===row.trn)||{ef:0.0623}).ef;
    const co2e = q*ef + q/1000*(+row.dist||0)*tef;
    total += co2e;
    const el = document.getElementById("mco2-"+row.id);
    if (el) el.textContent = f2(co2e);
  });
  const t = document.getElementById("mat-total");
  if (t) t.textContent = f2(total);
  updateTopbarLive();
}
function updateEnTotals() {
  let total = 0;
  S.ens.forEach(row => {
    const opt = EN[+row.tidx]||EN[0];
    const ef  = row.cusEf !== "" ? +row.cusEf||0 : opt.ef;
    const co2e = (+row.qty||0)*ef;
    total += co2e;
    const el = document.getElementById("eco2-"+row.id);
    if (el) el.textContent = f2(co2e);
  });
  const t = document.getElementById("en-total");
  if (t) t.textContent = f2(total);
  updateTopbarLive();
}
function updatePrcTotals() {
  let total = 0;
  S.proc.forEach(row => {
    const gwp  = (GAS.find(g=>g.label===row.gas)||{gwp:1}).gwp;
    const co2e = (+row.qty||0)*gwp;
    total += co2e;
    const el = document.getElementById("pco2-"+row.id);
    if (el) el.textContent = f3(co2e);
  });
  const t = document.getElementById("prc-total");
  if (t) t.textContent = f3(total);
  updateTopbarLive();
}
function updateWstTotals() {
  let total = 0;
  S.wste.forEach(row => {
    const ef   = (DISP.find(d=>d.label===row.route)||{ef:0}).ef;
    const co2e = (+row.qty||0)*ef;
    total += co2e;
    const el = document.getElementById("wco2-"+row.id);
    if (el) el.textContent = f3(co2e);
  });
  const t = document.getElementById("wst-total");
  if (t) t.textContent = f3(total);
  updateTopbarLive();
}
function updateSiteAlloc() {
  const sa = calcSiteAlloc();
  const a  = document.getElementById("alloc-total");
  const s1 = document.getElementById("alloc-sc1");
  const s2 = document.getElementById("alloc-sc2");
  const af = document.getElementById("alloc-factor");
  if (a) a.textContent  = fmt(sa.total_per_kg);
  if (s1) s1.textContent = fmt(sa.sc1_per_kg);
  if (s2) s2.textContent = fmt(sa.sc2_per_kg);
  if (af) af.textContent = ((1/sa.prodKg)*1e6).toFixed(4);
  updateTopbarLive();
}

// ══════════════════════════════════════════════════════════════
//  EVENT DELEGATION
// ══════════════════════════════════════════════════════════════
document.addEventListener("click", function(e) {
  const t = e.target;

  // Step dots
  const goto = t.closest("[data-goto]");
  if (goto) { S.step = +goto.dataset.goto; render(); return; }

  const action = t.dataset.action || t.closest("[data-action]")?.dataset.action;
  if (action === "next"  && S.step < STEPS.length-1) { S.step++; render(); return; }
  if (action === "back"  && S.step > 0)              { S.step--; render(); return; }
  if (action === "skip"  && S.step < STEPS.length-1) { S.step++; render(); return; }
  if (action === "add-mat") { S.mats.push(mkMat()); render(); return; }
  if (action === "add-en")  { S.ens.push(mkEn());   render(); return; }
  if (action === "add-prc") { S.proc.push(mkPrc()); render(); return; }
  if (action === "add-wst") { S.wste.push(mkWst()); render(); return; }

  // Remove rows
  if (t.dataset.rmMat) { S.mats = S.mats.filter(r=>r.id!==t.dataset.rmMat); render(); return; }
  if (t.dataset.rmEn)  { S.ens  = S.ens .filter(r=>r.id!==t.dataset.rmEn);  render(); return; }
  if (t.dataset.rmPrc) { S.proc = S.proc.filter(r=>r.id!==t.dataset.rmPrc); render(); return; }
  if (t.dataset.rmWst) { S.wste = S.wste.filter(r=>r.id!==t.dataset.rmWst); render(); return; }

  // Add material from DB picker
  if (t.dataset.addDb !== undefined) {
    const m = MAT_DB[+t.dataset.addDb];
    if (m) {
      S.mats.push({id:uid(),name:m.name,qty:0,ef:m.ef,src:m.src,trn:"Road — Large Truck",dist:500,isPreset:true,isDef:false});
      // scroll to table after adding
      setTimeout(()=>{const tb=document.getElementById("mat-tbody");if(tb)tb.scrollIntoView({behavior:"smooth",block:"nearest"});},100);
    }
    render(); return;
  }

  // Category filter pill
  if (t.dataset.setCat !== undefined) {
    S.matCatFilter = t.dataset.setCat === S.matCatFilter ? "" : t.dataset.setCat;
    // Re-render just the picker
    const pw = document.querySelector(".picker-wrap");
    if (pw) pw.outerHTML = renderPicker();
    else render();
    return;
  }

  // Energy method toggle
  if (t.dataset.method) { S.energyMethod = t.dataset.method; render(); return; }

  // Report actions
  if (action === "gen-report") {
    const body = document.getElementById("rpt-body");
    if (body) body.innerHTML = buildReport();
    return;
  }
  if (action === "print-report") {
    const body = document.getElementById("rpt-body");
    if (!body) return;
    const rptContent = body.innerHTML;
    const pi = S.pi;
    const w = window.open("", "_blank");
    w.document.write(`<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>PCF Report — ${esc(pi.name||"Product")}</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap">
<style>
body{font-family:'Plus Jakarta Sans',sans-serif;color:#1a1a1a;max-width:760px;margin:40px auto;padding:0 28px;font-size:14px;line-height:1.75}
h1{font-size:24px;font-weight:800;color:#1e6b4a;margin-bottom:4px;letter-spacing:-.4px}
.rpt-sub{font-size:12px;color:#6b7280;margin-bottom:22px;padding-bottom:12px;border-bottom:2px solid #b8eed6}
h2{font-size:16px;font-weight:800;color:#1e6b4a;margin:22px 0 8px;padding-bottom:5px;border-bottom:2px solid #b8eed6}
h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin:10px 0 5px}
p{margin-bottom:10px}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
th{background:#1e6b4a;color:#fff;padding:7px 10px;text-align:left;font-weight:700}
td{padding:6px 10px;border-bottom:1px solid #eee}
tr:nth-child(even) td{background:#f8f8f8}
tfoot td{background:#0f3d28;color:#fff;font-weight:700}
ul{padding-left:18px;margin-bottom:10px}li{margin-bottom:4px}
.rpt-result-box{background:linear-gradient(135deg,#0f3d28,#3daa7a);color:#fff;border-radius:10px;padding:18px 22px;margin:14px 0;text-align:center}
.rpt-result-box .big{font-size:38px;font-weight:800;letter-spacing:-1px;line-height:1}
.rpt-result-box .unit{font-size:13px;color:#b8eed6;margin-top:4px}
.rpt-result-box .sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:6px}
.rpt-signoff{border-top:1px solid #eee;margin-top:18px;padding-top:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;font-size:12px}
.rpt-signoff-field{border-bottom:1px solid #ccc;padding-bottom:4px;margin-bottom:3px;min-height:22px;font-size:12px}

@media print{body{margin:20px}@page{margin:1.5cm}}
</style>
</head><body>${rptContent}</body></html>`);
    w.document.close();
    setTimeout(() => w.print(), 400);
    return;
  }
});

document.addEventListener("input", function(e) {
  const t = e.target;
  // Material search input
  if (t.dataset.action === "mat-search") {
    S.matSearch = t.value;
    const inner = document.getElementById("picker-inner");
    if (inner) {
      // Re-render just the results portion
      const q   = (S.matSearch||"").toLowerCase().trim();
      const cat = S.matCatFilter || "";
      const filtered = MAT_DB.filter(m => {
        const matchCat  = !cat || m.cat === cat;
        const matchText = !q   || m.name.toLowerCase().includes(q) || m.cat.toLowerCase().includes(q);
        return matchCat && matchText;
      });
      const groups = {};
      for (const m of filtered) { if (!groups[m.cat]) groups[m.cat]=[]; groups[m.cat].push(m); }
      let rh = "";
      if (!filtered.length) {
        rh = `<div class="picker-empty">No materials match — add a custom row below instead.</div>`;
      } else {
        const groupOrder = CAT_META.map(cm=>cm.cat).filter(c=>groups[c]);
        for (const c of groupOrder) {
          const meta = CAT_META.find(cm=>cm.cat===c)||{emoji:"",label:c};
          rh += `<div class="picker-group-label">${meta.emoji} ${esc(meta.label)} (${groups[c].length})</div>`;
          for (const m of groups[c]) {
            const gi = MAT_DB.indexOf(m);
            rh += `<div class="picker-row"><div class="picker-row-left"><span class="picker-name" title="${esc(m.name)}">${esc(m.name)}</span><span class="picker-cat-tag">${esc(m.cat)}</span></div><div style="display:flex;align-items:center;gap:10px;flex-shrink:0"><span class="picker-ef">${m.ef}<span class="picker-ef-unit"> kg CO₂e/kg</span></span><button class="picker-add-btn" data-add-db="${gi}">+ Add</button></div></div>`;
          }
        }
      }
      inner.innerHTML = rh;
    }
    return;
  }
  if (t.dataset.pi)  { S.pi[t.dataset.pi] = t.value; updateTopbarLive(); return; }
  if (t.dataset.mat) {
    const row = S.mats.find(r=>r.id===t.dataset.mat);
    if (row) { row[t.dataset.f] = t.value; if (t.dataset.f==="qty") row.isDef = false; updateMatTotals(); }
    return;
  }
  if (t.dataset.en) {
    const row = S.ens.find(r=>r.id===t.dataset.en);
    if (row) { row[t.dataset.f] = t.value; if (t.dataset.f==="qty") row.isDef = false; updateEnTotals(); }
    return;
  }
  if (t.dataset.prc) {
    const row = S.proc.find(r=>r.id===t.dataset.prc);
    if (row) { row[t.dataset.f] = t.value; updatePrcTotals(); }
    return;
  }
  if (t.dataset.wst) {
    const row = S.wste.find(r=>r.id===t.dataset.wst);
    if (row) { row[t.dataset.f] = t.value; updateWstTotals(); }
    return;
  }
  // Site allocation inputs
  if (t.id === "site-sc1")  { S.site.sc1_mt  = +t.value||0; updateSiteAlloc(); return; }
  if (t.id === "site-sc2")  { S.site.sc2_mt  = +t.value||0; updateSiteAlloc(); return; }
  if (t.id === "site-prod") {
    if (S.site.prodUnit === "lb") S.site.prod_lb = (+t.value||0) * 1e6;
    else S.site.prod_lb = +t.value||0;
    updateSiteAlloc(); return;
  }
});

document.addEventListener("change", function(e) {
  const t = e.target;
  // Site production unit toggle
  if (t.id === "site-produnit") {
    S.site.prodUnit = t.value;
    render(); return;
  }
  // Energy type select
  if (t.dataset.en && t.dataset.f === "tidx") {
    const row = S.ens.find(r=>r.id===t.dataset.en);
    if (row) {
      const newOpt = EN[+t.value];
      row.tidx = +t.value;
      if (row.isDef || +row.qty === 0) {
        row.qty    = newOpt ? newOpt.dQty : 0;
        row.isDef  = !!(newOpt && newOpt.dQty > 0);
      }
      row.cusEf = "";
      render(); // full re-render to update scope colour
    }
    return;
  }
  if (t.dataset.mat && t.dataset.f === "trn") {
    const row = S.mats.find(r=>r.id===t.dataset.mat);
    if (row) { row.trn = t.value; updateMatTotals(); } return;
  }
  if (t.dataset.prc && t.dataset.f === "gas") {
    const row = S.proc.find(r=>r.id===t.dataset.prc);
    if (row) { row.gas = t.value; updatePrcTotals(); } return;
  }
  if (t.dataset.wst && t.dataset.f === "route") {
    const row = S.wste.find(r=>r.id===t.dataset.wst);
    if (row) { row.route = t.value; updateWstTotals(); } return;
  }
});

render();
</script>
